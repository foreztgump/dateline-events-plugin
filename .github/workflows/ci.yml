name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    env:
      # Pin TZ to make timezone-sensitive tests host-independent. Tests assume
      # UTC unless they explicitly stub Intl with a target tzid.
      TZ: UTC
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10.33.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ci-grep-gate.sh uses ripgrep, which ubuntu-latest does not preinstall.
      # The gate is blocking from M2, so a missing rg must fail loudly at install
      # time rather than as an opaque exit 127 inside the gate.
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      # M2 makes the source-level EmDash 0.18 grep gate blocking now that
      # atomicIncrement and atomicDecrement are removed from plugin code.
      # README/docs pre-v0.2 wording is cleared by the scheduled M4 docs pass.
      # Terms: emdash.config.ts | EMDASH_PLUGIN_MANIFEST | atomicIncrement |
      # atomicDecrement | createCorePlugin. plugin:activate is intentionally
      # not a gate term because it is a verified 0.18 lifecycle hook.
      # Excludes: docs/, README.md, research/, openspec/, MIGRATION.md,
      # CHANGELOG*, PRD*, VERIFIED-PLATFORM-0.18.md, dist/, node_modules/.
      - name: EmDash 0.18 grep gate
        run: ./tools/ci-grep-gate.sh

      - name: Validate sandboxed plugins
        run: |
          (cd packages/core && ./node_modules/.bin/emdash-plugin validate)
          (cd packages/rsvp && ./node_modules/.bin/emdash-plugin validate)
          (cd packages/importer && ./node_modules/.bin/emdash-plugin validate)

      - name: Build sandboxed plugins
        run: |
          mkdir -p packages/core/node_modules/.cache/emdash-build
          mkdir -p packages/rsvp/node_modules/.cache/emdash-build
          mkdir -p packages/importer/node_modules/.cache/emdash-build
          (cd packages/core && TMPDIR=./node_modules/.cache/emdash-build ./node_modules/.bin/emdash-plugin build)
          (cd packages/rsvp && TMPDIR=./node_modules/.cache/emdash-build ./node_modules/.bin/emdash-plugin build)
          (cd packages/importer && TMPDIR=./node_modules/.cache/emdash-build ./node_modules/.bin/emdash-plugin build)
          # These artifacts intentionally capture the marketplace-facing
          # emdash-plugin build outputs before the later workspace tsc build.
          mkdir -p sandbox-plugin-build-artifacts
          tar -czf sandbox-plugin-build-artifacts/dateline-core-build.tar.gz -C packages/core dist emdash-plugin.jsonc
          tar -czf sandbox-plugin-build-artifacts/dateline-rsvp-build.tar.gz -C packages/rsvp dist emdash-plugin.jsonc
          tar -czf sandbox-plugin-build-artifacts/dateline-importer-build.tar.gz -C packages/importer dist emdash-plugin.jsonc

      - name: Upload sandboxed plugin build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sandboxed-plugin-builds
          path: sandbox-plugin-build-artifacts/*.tar.gz
          if-no-files-found: error

      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint

      - name: Test
        run: pnpm -r test

      - name: Sandbox profile
        run: pnpm sandbox:profile

  emdash-latest-canary:
    name: emdash@latest canary
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      TZ: UTC
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10.33.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install pinned dependencies
        run: pnpm install --frozen-lockfile

      - name: Override emdash to latest
        run: |
          pnpm pkg set "pnpm.overrides.emdash=latest"
          pnpm install --no-frozen-lockfile

      - name: Build against emdash@latest
        run: pnpm -r build

      - name: Typecheck against emdash@latest
        run: pnpm -r typecheck
