name: Release

# Publishes all six @dateline packages to npm.
#
# Two paths:
#   1. push of a `v*` tag  -> real publish via `changeset publish`.
#   2. workflow_dispatch    -> dry-run (`changeset publish --dry-run`) for
#      verification before cutting a real tag. No authentication, no publish.
#
# Provenance: when the source repo is PUBLIC and trusted publishing is
# configured for each package on npmjs.com, the npm CLI generates provenance
# automatically (id-token: write below mints the OIDC token). The very first
# 0.3.0 publish is done locally (a first-ever publish cannot use trusted
# publishing), so this workflow carries provenance from 0.3.1 onward.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Pack tarballs and report what would publish, without authenticating or publishing."
        type: boolean
        default: true

permissions:
  contents: read
  # Required for npm provenance / OIDC trusted publishing.
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    env:
      TZ: UTC
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10.33.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .nvmrc
          # Sets up the npm auth context. The token is only consumed on a real
          # publish; the dry-run path never authenticates.
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      # `changeset publish` has no dry-run flag, so verification packs the
      # tarballs with pnpm instead. This rewrites workspace:* ranges to the
      # resolved versions exactly as a real publish would, and prints each
      # tarball's contents — without authenticating or pushing to the registry.
      - name: Publish (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: pnpm -r publish --dry-run --no-git-checks

      - name: Publish to npm
        if: github.event_name == 'push'
        run: pnpm exec changeset publish
        env:
          # Provenance is scoped to the publish step ONLY (not the whole job) so
          # the dry-run path never trips it. It also must NOT be set for the
          # first-ever 0.3.0 publish: npm cannot generate provenance until a
          # trusted-publisher mapping exists for the package, so 0.3.0 is
          # published locally without provenance (see CONTRIBUTING.md). This
          # workflow — and provenance — apply from 0.3.1 onward.
          NPM_CONFIG_PROVENANCE: "true"
          # Transitional: consumed only until trusted publishing is configured
          # for every package on npmjs.com, after which this secret can be
          # removed and OIDC handles authentication tokenlessly.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
